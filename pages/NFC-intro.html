<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖誕快樂！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            width: 90vw;
            max-width: 800px;
            text-align: center;
        }

        .header {
            margin-bottom: 2rem;
            font-size: clamp(2rem, 5vw, 3rem);
            color: #333;
        }

        .envelope {
            width: 80vw;
            max-width: 600px;
            height: 60vh;
            max-height: 450px;
            background: #D2B48C; /* 牛皮紙色 */
            border-radius: 5px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            margin: 0 auto;
            transition: transform 0.5s ease-in-out;
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #C19A6B; /* 深色牛皮紙 */
            clip-path: polygon(0% 0%, 50% 50%, 100% 0%);
            transition: all 0.8s ease-in-out;
        }

        .letter {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 4%;
            background: #D2B48C; /* 牛皮紙背景 */
            color: black;
            text-align: left;
            opacity: 0;
            transform: translateY(100%);
            transition: all 0.8s ease-in-out;
            overflow-y: auto;
        }

        .letter-content h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem); /* 自適應標題 */
            margin-bottom: 1rem;
        }

        .letter-content p {
            font-size: clamp(1rem, 2.5vw, 1.5rem); /* 自適應段落 */
            line-height: 1;
            white-space: pre-line;
            color: #333;
        }

        .letter-content a {
            font-size: clamp(1rem, 2.5vw, 1.5rem); /* 自適應連結 */
            color: #0645AD;
            text-decoration: underline;
        }

        .envelope.open .flap {
            transform: translateY(-100%) rotateX(180deg);
        }

        .envelope.open .letter {
            opacity: 1;
            transform: translateY(0);
        }

        .footer {
            margin-top: 2rem;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: #555;
        }

        @media (min-width: 1024px) {
            .container {
                display: grid;
                grid-template-rows: auto 1fr auto;
                gap: 2rem;
            }

            .footer {
                text-align: right;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🎄 聖誕快樂！🎄</div>

    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter" id="letter">
            <div class="letter-content">
                <h1>嗨！朋友，</h1>
                <p>
                    這張 NFC 卡，可以寫入如網址、簡介等資料，<br>
                    也可以用 NFC 打開應用程式，或是 iOS 的捷徑，<br>
                    只要手機靠近 NFC 卡，就會讀取並自動執行。<br>
                    這張酷酷的 NFC 卡就交給你了，<br>
                    歡迎修改、寫入其他功能~<br>
                    用法：下載 NFC Tools，就可以寫入功能了！
                    <a href="https://apps.apple.com/tw/app/nfc-tools/id1252962749" target="_blank">
                        NFC Tools iOS 下載連結</a>
                    <a href="https://play.google.com/store/apps/details?id=com.wakdev.wdnfc" target="_blank">
                        NFC Tools Android 下載連結
                    </a>
                    最後，祝你聖誕快樂！且有個愉快的寒假 \owo/ <br>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('envelope').addEventListener('click', function() {
        this.classList.add('open');
    });
</script>

</body>
</html>
